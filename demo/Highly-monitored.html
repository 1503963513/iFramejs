<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iFrame.js - Parent Page Demo</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
                'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
        }

        .page-title {
            margin: 0 0 16px 0;
            font-size: 24px;
            font-weight: 600;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .status-box {
            background: #f5f7fa;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 3px solid #667eea;
        }

        .status-label {
            font-size: 12px;
            color: #909399;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-content {
            font-size: 14px;
            color: #303133;
            font-weight: 500;
            word-break: break-all;
            min-height: 22px;
        }

        .status-content.empty {
            color: #c0c4cc;
            font-style: italic;
        }

        .send-status {
            margin-top: 12px;
            padding: 12px 16px;
            background: #f0fdf4;
            border-radius: 8px;
            font-size: 13px;
            color: #15803d;
            text-align: left;
            display: none;
        }

        .send-status.show {
            display: block;
        }

        .send-status.error {
            background: #fef2f2;
            color: #dc2626;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .btn-ack {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
            margin-top: 12px;
        }

        .btn-ack:hover {
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.6);
        }

        .iframe-wrapper {
            flex: 1;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            min-height: 200px;
        }

        iframe {
            width: 100%;
            border: none;
            display: block;
            border-radius: 12px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* 暗色模式样式 */
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        body.dark-mode .control-panel {
            background: rgba(30, 30, 46, 0.95);
        }

        body.dark-mode .page-title {
            color: #60a5fa;
        }

        body.dark-mode .status-box {
            background: #1e1e2e;
            border-color: #60a5fa;
        }

        body.dark-mode .status-label {
            color: #64748b;
        }

        body.dark-mode .status-content {
            color: #e2e8f0;
        }

        body.dark-mode .send-status {
            background: #1e3a2f;
            color: #4ade80;
        }

        body.dark-mode .send-status.error {
            background: #3a1a1a;
            color: #ef4444;
        }

        body.dark-mode .iframe-wrapper {
            background: #1e1e2e;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="control-panel">
            <h1 class="page-title">父页面 - 高度自动同步演示</h1>
            <div class="status-box">
                <div class="status-label">当前 iframe 高度</div>
                <div class="status-content" id="iframeHeight">-- px</div>
            </div>
            <div class="status-box">
                <div class="status-label">说明</div>
                <div class="status-content" style="color: #909399;">
                    子页面内容变化时，iframe 高度会自动调整。<br>
                    在子页面中点击"加载更多列表项"或"切换折叠面板"查看效果。
                </div>
            </div>
        </div>
        <div class="iframe-wrapper">
            <iframe src="" id="child"></iframe>
        </div>
    </div>
    <script src="../index.js"></script>
    <script>
        // 初始化时开启高度同步
        const iframeApp = new Iframe({
            container: document.getElementById('child'),
            url: 'http://127.0.0.1:5501/demo/Highly-monitored-child.html',
            whiteList: ['http://127.0.0.1:5501']
        });

        // 授权接收高度同步（父页面只需要这一行！）
        iframeApp.enableAutoResize();

        // 实时显示 iframe 高度
        function updateHeightDisplay() {
            const iframe = document.getElementById('child');
            if (iframe) {
                document.getElementById('iframeHeight').textContent = iframe.offsetHeight + ' px';
            }
        }

        // 监听 iframe 高度变化
        const iframe = document.getElementById('child');
        const resizeObserver = new ResizeObserver(() => {
            updateHeightDisplay();
        });
        resizeObserver.observe(iframe);
        updateHeightDisplay();

        console.log('父页面已加载，高度自动同步已开启');
    </script>
</body>

</html>
