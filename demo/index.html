<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iFrame.js - Parent Page Demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB',
          'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        overflow: hidden;
      }

      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 20px;
        gap: 20px;
      }

      .control-panel {
        background: rgba(255, 255, 255, 0.95);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(10px);
      }

      .page-title {
        margin: 0 0 16px 0;
        font-size: 24px;
        font-weight: 600;
        color: #667eea;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .page-title::before {
        content: '';
        width: 4px;
        height: 24px;
        background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
        border-radius: 2px;
      }

      .status-box {
        background: #f5f7fa;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        border-left: 3px solid #667eea;
      }

      .status-label {
        font-size: 12px;
        color: #909399;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-content {
        font-size: 14px;
        color: #303133;
        font-weight: 500;
        word-break: break-all;
        min-height: 22px;
      }

      .status-content.empty {
        color: #c0c4cc;
        font-style: italic;
      }

      .send-status {
        margin-top: 12px;
        padding: 12px 16px;
        background: #f0fdf4;
        border-radius: 8px;
        font-size: 13px;
        color: #15803d;
        text-align: left;
        display: none;
      }

      .send-status.show {
        display: block;
      }

      .send-status.error {
        background: #fef2f2;
        color: #dc2626;
      }

      .btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 32px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(102, 126, 234, 0.6);
      }

      .btn:active {
        transform: translateY(0);
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
      }

      .btn-ack {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        margin-top: 12px;
      }

      .btn-ack:hover {
        box-shadow: 0 6px 16px rgba(245, 87, 108, 0.6);
      }

      .iframe-wrapper {
        flex: 1;
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="control-panel">
        <h1 class="page-title">父页面</h1>
        <div class="status-box">
          <div class="status-label">接收消息</div>
          <div class="status-content empty" id="opt">等待消息...</div>
        </div>
        <button class="btn" id="b">发送消息到子页面</button>
        <button class="btn btn-ack" id="bAck">发送确认消息</button>
        <div class="send-status" id="sendStatus"></div>
      </div>
      <div class="iframe-wrapper">
        <iframe src="" id="child"></iframe>
      </div>
    </div>
    <!-- <script src="../index.js"></script>
    <script > -->
    <script type="module">
      import { Iframe } from '../ejs/index.js';
      var opt = document.getElementById('opt');
      var ob = document.getElementById('b');
      var obAck = document.getElementById('bAck');
      var count = 0;

      const iframe = new Iframe({
        container: document.getElementById('child'),
        url: 'http://127.0.0.1:5501/demo/child.html',
        whiteList: ['http://127.0.0.1:5501'],
        timeout: 5000,
      });

      iframe.message = (e) => {
        const msg = e.data?.msg;
        console.log('index  Received default message', e);
        console.log('index  Message content:', e.data);
        console.log('index  Extracted msg:', msg);
        opt.classList.remove('empty');
        opt.innerText = msg || JSON.stringify(e);
      };

      iframe.action('handel', (e) => {
        console.log('index  Received custom message', e);
      });

      function showSendStatus(success, message) {
        const sendStatus = document.getElementById('sendStatus');
        sendStatus.classList.add('show');
        sendStatus.classList.remove('error');

        if (success) {
          sendStatus.textContent = `✓ 发送成功: ${message}`;
          sendStatus.classList.remove('error');
        } else {
          sendStatus.textContent = `✗ 发送失败: ${message}`;
          sendStatus.classList.add('error');
        }

        setTimeout(() => {
          sendStatus.classList.remove('show');
        }, 3000);
      }

      ob.onclick = function () {
        count++;

        if (!iframe.isReady()) {
          showSendStatus(false, '通信未就绪');
          console.error('通信未就绪,无法发送消息');
          return;
        }

        const message = 'hello child ' + count;

        const sendResult = iframe.sendMessage({ msg: message });
        const emitResult = iframe.emit('handel', { msg: message });

        const success = sendResult && emitResult;
        showSendStatus(success, message);

        if (success) {
          console.log(`✓ 消息发送成功: ${message}`);
        } else {
          console.error(`✗ 消息发送失败: ${message}`);
        }
      };

      obAck.onclick = async function () {
        count++;

        if (!iframe.isReady()) {
          showSendStatus(false, '通信未就绪');
          console.error('通信未就绪,无法发送消息');
          return;
        }

        const message = 'hello child with ACK ' + count;
        showSendStatus(true, '发送确认消息中...');

        try {
          const result = await iframe.sendMessageWithAckToChild({ msg: message }, 5000);
          showSendStatus(result, result ? `收到确认: ${message}` : '确认超时');

          if (result) {
            console.warn(`✓ 消息已确认收到: ${message}`);
          } else {
            console.error(`✗ 消息确认超时: ${message}`);
          }
        } catch (error) {
          console.error('ACK 错误:', error);
          showSendStatus(false, 'ACK 错误');
        }
      };
    </script>
  </body>
</html>
